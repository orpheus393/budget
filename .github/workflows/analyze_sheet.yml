name: 시트 분석 요약 (수동 실행)

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: '특정 기간 시작일 (YYYY-MM-DD, 선택, 비우면 생략)'
        required: false
        default: ''
      date_to:
        description: '특정 기간 종료일 (YYYY-MM-DD, 선택)'
        required: false
        default: ''

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install 'gspread>=6.0.0' 'google-auth>=2.28.0'

      - name: 분석 실행
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          DATE_FROM: ${{ inputs.date_from }}
          DATE_TO: ${{ inputs.date_to }}
        run: python scripts/analyze_sheet.py
