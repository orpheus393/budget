name: 가계부 이메일 자동 수집

on:
  schedule:
    # 1일 1회 (00:00 UTC = 09:00 KST). 한국 은행·카드사는 실시간 입출금/결제
    # 알림을 이메일로 보내지 않음 (앱푸시·카톡·SMS만). 이메일로 실제 오는 건
    # 월 1회 카드 명세서(BC PDF, KB HTML)뿐 — STATEMENT_LOOKBACK_DAYS=35라
    # 하루 1회로도 놓치지 않음. 매시간 cron은 가져올 게 없어 낭비였음.
    - cron: '0 0 * * *'
  workflow_dispatch:       # 수동 실행 버튼
    inputs:
      lookback_hours:
        description: '검색 기간 (시간). 1일 1회 cron 기준 기본 26시간. 누적 메일 일회 정리 시 720(30일) 권장'
        required: false
        default: '26'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Tesseract 한국어 OCR 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-kor

      - name: 의존성 설치
        # requirements.txt 전체 설치 — PR CI(test.yml)와 동일한 의존성 셋.
        # 가벼운 부분집합만 설치하던 과거 방식은 cron 환경 ≠ test 환경
        # 갭으로 ModuleNotFoundError 회귀 위험 (PR #28 핫픽스 참고).
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 파서 단위 테스트
        run: python scripts/test_email_parser.py

      - name: 이메일 파싱 실행
        env:
          NAVER_EMAIL: ${{ secrets.NAVER_EMAIL }}
          NAVER_APP_PW: ${{ secrets.NAVER_APP_PW }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          BC_PDF_PASSWORD: ${{ secrets.BC_PDF_PASSWORD }}
          KAKAO_XLSX_PASSWORD: ${{ secrets.KAKAO_XLSX_PASSWORD }}
          ENABLE_EMAIL_CLEANUP: "true"
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '26' }}
          STATEMENT_LOOKBACK_DAYS: "35"
        run: python scripts/email_parser.py

      - name: 실패 시 슬랙 알림 (직전 실패와 같은 커밋이면 dedup)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL 미설정 — 알림 스킵"
            exit 0
          fi
          # 직전 5개 cron 실행 중 같은 커밋에서 failure가 있었으면 알림 스킵
          # (같은 sha 반복 실패 시 매시간 알림 폭주 방지)
          prev_failures=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/fetch_emails.yml/runs?per_page=6" \
            --jq '.workflow_runs | map(select(.id != ${{ github.run_id }})) | .[0:5] | map(select(.conclusion == "failure" and .head_sha == "${{ github.sha }}")) | length')
          if [ "$prev_failures" -gt 0 ]; then
            echo "직전 5개 run 중 같은 커밋 (${{ github.sha }})에서 failure 이미 ${prev_failures}회 — 알림 dedup 스킵"
            exit 0
          fi
          curl -s -X POST -H 'Content-Type: application/json' \
            --data "{\"text\": \":x: *가계부 cron 실패* — workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK_URL" || true
