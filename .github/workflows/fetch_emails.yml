name: 가계부 이메일 자동 수집

on:
  schedule:
    - cron: '0 * * * *'  # 매시간 실행
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Tesseract 한국어 OCR 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-kor

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install 'gspread>=6.0.0' 'google-auth>=2.28.0' 'pdfplumber>=0.11.0' 'pymupdf>=1.24.0'

      - name: 파서 단위 테스트
        run: python scripts/test_email_parser.py

      - name: 이메일 파싱 실행
        env:
          NAVER_EMAIL: ${{ secrets.NAVER_EMAIL }}
          NAVER_APP_PW: ${{ secrets.NAVER_APP_PW }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          BC_PDF_PASSWORD: ${{ secrets.BC_PDF_PASSWORD }}
          ENABLE_EMAIL_CLEANUP: "true"
          LOOKBACK_HOURS: "2"
          STATEMENT_LOOKBACK_DAYS: "35"
        run: python scripts/email_parser.py
