name: 가계부 이메일 자동 수집

on:
  schedule:
    - cron: '0 * * * *'  # 매시간 실행
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install gspread google-auth imaplib2

      - name: 이메일 파싱 실행
        env:
          NAVER_EMAIL: ${{ secrets.NAVER_EMAIL }}
          NAVER_APP_PW: ${{ secrets.NAVER_APP_PW }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python scripts/email_parser.py
