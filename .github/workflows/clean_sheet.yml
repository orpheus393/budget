name: 시트 정리 (수동, 위험)

on:
  workflow_dispatch:
    inputs:
      source_filter:
        description: '삭제할 출처 (예: BC카드)'
        required: false
        default: 'BC카드'
        type: string
      origin_contains:
        description: '원문 컬럼에 포함되어야 할 문자열 (예: 월간명세서)'
        required: false
        default: '월간명세서'
        type: string
      dry_run:
        description: 'DRY_RUN — true면 미리보기만'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install 'gspread>=6.0.0' 'google-auth>=2.28.0'

      - name: 시트 정리 실행
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          SOURCE_FILTER: ${{ inputs.source_filter }}
          ORIGIN_CONTAINS: ${{ inputs.origin_contains }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: python scripts/clean_sheet.py
