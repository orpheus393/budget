name: 시트 덤프 (수동 실행 전용)

on:
  workflow_dispatch:
    inputs:
      source_filter:
        description: '출처 필터 (예: BC카드, 비워두면 전체)'
        required: false
        default: 'BC카드'
        type: string
      limit:
        description: '최대 출력 행 수'
        required: false
        default: '50'
        type: string

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install 'gspread>=6.0.0' 'google-auth>=2.28.0'

      - name: 시트 덤프 실행
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          SOURCE_FILTER: ${{ inputs.source_filter }}
          LIMIT: ${{ inputs.limit }}
        run: python scripts/dump_sheet.py
